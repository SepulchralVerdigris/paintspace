<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PaintSpace</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Bebas+Neue&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#1a1a1a;--paper:#f4f0e8;--accent:#c8392b;--muted:#888;
  --border:#ccc6b8;--panel-w:310px;
}
html,body{height:100%;overflow:hidden}
body{
  background:var(--paper);color:var(--ink);
  font-family:'Courier Prime',monospace;
  display:grid;
  grid-template-columns:1fr var(--panel-w);
  grid-template-rows:auto 1fr;
  transition:grid-template-columns .3s ease;
}
body.panel-hidden{grid-template-columns:1fr 0}

/* Panel column wraps scrollable content + sticky footer */
#panel-col{
  grid-column:2;grid-row:2;
  display:flex;flex-direction:column;
  overflow:hidden;
  border-left:2px solid var(--ink);
  background:var(--paper);
  transition:opacity .3s;
  min-height:0;
}
body.panel-hidden #panel-col{opacity:0;pointer-events:none}
#panel{
  flex:1;overflow-y:auto;overflow-x:hidden;
  background:var(--paper);
}
#panel::-webkit-scrollbar{width:4px}
#panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* ── Header ── */
header{
  grid-column:1/-1;padding:10px 18px;
  border-bottom:2px solid var(--ink);
  display:flex;align-items:center;gap:14px;flex-wrap:wrap;
}
header h1{font-family:'Bebas Neue',sans-serif;font-size:1.9rem;letter-spacing:.08em;font-weight:400}
.header-controls{display:flex;gap:8px;align-items:center;margin-left:auto;flex-wrap:wrap}

#face-select{
  font-family:'Courier Prime',monospace;font-size:.85rem;
  padding:7px 10px;border:1px solid var(--border);background:var(--paper);
  color:var(--ink);border-radius:2px 0 0 2px;cursor:pointer;outline:none;
}
#face-select:focus{border-color:var(--accent)}

.icon-btn{
  display:flex;align-items:center;gap:6px;
  padding:7px 13px;border:1px solid var(--border);background:var(--paper);
  color:var(--ink);font-family:'Bebas Neue',sans-serif;font-size:.88rem;font-weight:400;
  letter-spacing:.06em;border-radius:2px;cursor:pointer;
  transition:background .15s,border-color .15s;white-space:nowrap;
}
.icon-btn:hover{background:var(--ink);color:var(--paper)}
.icon-btn svg{width:15px;height:15px;flex-shrink:0}

/* ── Canvas ── */
#canvas-wrap{
  position:relative;overflow:hidden;background:#111;cursor:grab;
}
#canvas-wrap:active{cursor:grabbing}
canvas{display:block;width:100%!important;height:100%!important}

#axis-overlay{position:absolute;inset:0;pointer-events:none;}
.ax-label{
  position:absolute;font-family:'Bebas Neue',sans-serif;font-weight:400;
  font-size:.82rem;letter-spacing:.12em;color:rgba(255,255,255,.38);
  transform:translate(-50%,-50%);white-space:nowrap;
}

#tooltip{
  position:absolute;background:rgba(14,14,14,.94);color:#f4f0e8;
  font-family:'Courier Prime',monospace;font-size:.8rem;padding:9px 13px;
  border-radius:3px;pointer-events:none;display:none;line-height:1.7;
  z-index:20;border-left:3px solid #fff;max-width:220px;
}
#hint{
  position:absolute;bottom:12px;left:50%;transform:translateX(-50%);
  font-size:.68rem;color:rgba(255,255,255,.22);font-family:'Courier Prime',monospace;
  pointer-events:none;letter-spacing:.05em;
}

#colour-list{overflow-y:auto;padding:4px 0;max-height:300px}
#colour-list::-webkit-scrollbar{width:3px}
#colour-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.colour-item{
  display:grid;grid-template-columns:28px 1fr auto;
  align-items:center;gap:8px;padding:7px 14px;
  cursor:pointer;border-left:3px solid transparent;
  transition:background .1s,border-color .1s;font-size:.78rem;
}
.colour-item:hover{background:rgba(0,0,0,.05)}
.colour-item.active{border-left-color:var(--accent);background:rgba(200,57,43,.06)}
.swatch{width:28px;height:28px;border-radius:3px;border:1px solid rgba(0,0,0,.12);flex-shrink:0}
.colour-meta{display:flex;flex-direction:column;gap:2px;min-width:0}
.colour-name{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:.8rem}
.colour-brand{color:var(--muted);font-size:.7rem;display:flex;flex-wrap:wrap;align-items:center;gap:3px}
.type-tag{
  font-size:.62rem;padding:1px 5px;border-radius:2px;
  background:var(--border);color:var(--ink);letter-spacing:.02em;
  font-family:'Courier Prime',monospace;line-height:1.5;
}
/* Badge: show H/S/V or L/C/H in a row */
.hsv-badge{
  font-size:.66rem;color:var(--muted);text-align:right;flex-shrink:0;
  white-space:nowrap;letter-spacing:.01em;
}

.add-row{display:flex;gap:6px;margin-bottom:6px}
.add-row input{
  flex:1;padding:7px 9px;border:1px solid var(--border);background:#fff;
  font-family:'Courier Prime',monospace;font-size:.82rem;border-radius:2px;
  outline:none;color:var(--ink);
}
.add-row input:focus{border-color:var(--accent)}
#add-btn{
  padding:7px 12px;background:var(--ink);color:var(--paper);border:none;
  font-family:'Bebas Neue',sans-serif;font-size:.92rem;font-weight:400;letter-spacing:.06em;
  border-radius:2px;cursor:pointer;transition:background .15s;
}
#add-btn:hover{background:var(--accent)}
#csv-file{display:none}

/* ── Colour Match ── */
#match-section{
  border-top:2px solid var(--ink);
  background:var(--paper);
}
.section-header{
  display:flex;align-items:center;gap:6px;padding:10px 14px 9px;
  cursor:pointer;user-select:none;border-bottom:1px solid var(--border);
}
#panel>*+.section-header,
#panel>.section-body+.section-header,
#panel>#add-header,
#panel>#match-section{
  border-top:2px solid var(--ink);
}
.section-header h3{
  font-family:'Bebas Neue',sans-serif;font-size:1rem;font-weight:400;letter-spacing:.1em;
  color:var(--ink);flex:1;
}
.section-header .chevron{
  width:13px;height:13px;transition:transform .2s;flex-shrink:0;
  color:var(--muted);
}
.section-header.collapsed .chevron{transform:rotate(-90deg)}
.section-body{overflow:hidden;transition:max-height .25s ease}
.section-body.collapsed{max-height:0!important}

.sec-label-plain{
  font-family:'Bebas Neue',sans-serif;font-size:.82rem;font-weight:400;letter-spacing:.08em;
  color:var(--muted);margin-bottom:6px;
}
#match-inner{padding:10px 14px}
#match-row{display:flex;gap:6px;align-items:center;margin-bottom:8px}
#match-hex{
  flex:1;padding:7px 9px;border:1px solid var(--border);background:#fff;
  font-family:'Courier Prime',monospace;font-size:.82rem;border-radius:2px;
  outline:none;color:var(--ink);min-width:0;
}
#match-hex:focus{border-color:var(--accent)}
#match-swatch{
  width:28px;height:28px;border-radius:3px;border:1px solid rgba(0,0,0,.15);
  flex-shrink:0;background:#888;transition:background .2s;
}
#match-results{display:flex;flex-direction:column;gap:4px}
.match-item{
  display:grid;grid-template-columns:24px 1fr auto;
  align-items:center;gap:8px;padding:5px 0;font-size:.75rem;
}
.match-swatch{
  width:24px;height:24px;border-radius:2px;
  border:1px solid rgba(0,0,0,.12);flex-shrink:0;
}
.match-meta{display:flex;flex-direction:column;gap:2px;min-width:0}
.match-name{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.match-brand{color:var(--muted);font-size:.68rem}
.match-dist{
  font-size:.68rem;color:var(--muted);text-align:right;flex-shrink:0;
  white-space:nowrap;
}
.match-item.rank-1 .match-name{color:var(--accent)}

#match-by-row{display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap}
.match-by-btn{
  padding:4px 10px;border:1px solid var(--border);border-radius:2px;
  font-family:'Courier Prime',monospace;font-size:.72rem;
  cursor:pointer;background:var(--paper);color:var(--muted);
  transition:background .12s,color .12s,border-color .12s;user-select:none;
}
.match-by-btn.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.match-by-btn:hover:not(.on){border-color:var(--ink);color:var(--ink)}

/* ── Paint search ── */
#paint-search-wrap{
  display:flex;align-items:center;gap:6px;
  padding:7px 14px;border-bottom:1px solid var(--border);
}
#paint-search-icon{flex-shrink:0;color:var(--muted)}
#paint-search{
  flex:1;border:none;outline:none;background:transparent;
  font-family:'Courier Prime',monospace;font-size:.82rem;color:var(--ink);
  min-width:0;
}
#paint-search::placeholder{color:var(--muted)}
#paint-search-clear{
  flex-shrink:0;color:var(--muted);cursor:pointer;font-size:1rem;
  line-height:1;display:none;user-select:none;
}
#paint-search-clear:hover{color:var(--accent)}
#paint-search-wrap:focus-within{border-bottom-color:var(--ink)}

/* ── Gap Analysis ── */
#gap-inner{padding:10px 14px}
#gap-pagination{
  display:flex;gap:6px;align-items:center;margin-top:8px;flex-wrap:wrap;
}
#gap-pagination .page-btn{
  padding:4px 11px;border:1px solid var(--border);border-radius:2px;
  font-family:'Courier Prime',monospace;font-size:.78rem;
  cursor:pointer;background:var(--paper);color:var(--muted);
  transition:background .12s,color .12s;user-select:none;
}
#gap-pagination .page-btn.active{background:var(--ink);color:var(--paper);border-color:var(--ink)}
#gap-pagination .page-btn.disabled{opacity:.3;cursor:default;pointer-events:none}
#gap-pagination .page-btn:hover:not(.active):not(.disabled){border-color:var(--ink);color:var(--ink)}
#gap-pagination .page-info{font-size:.72rem;color:var(--muted);font-family:'Courier Prime',monospace}
.gap-item{
  display:grid;grid-template-columns:28px 1fr auto;
  align-items:center;gap:8px;padding:6px 0;
  font-size:.75rem;border-bottom:1px solid var(--border);
}
.gap-item:last-child{border-bottom:none}
.gap-dist{font-size:.68rem;color:var(--muted);text-align:right;flex-shrink:0;white-space:nowrap}

/* Reference image */
#ref-img-wrap{
  position:relative;margin-top:8px;display:none;
  border:1px solid var(--border);border-radius:2px;overflow:hidden;
  cursor:crosshair;
}
#ref-img-wrap.loaded{display:block}
#ref-img{display:block;width:100%;height:auto;pointer-events:none;user-select:none}
#dropper-cursor{
  position:absolute;pointer-events:none;display:none;
  width:24px;height:24px;border-radius:50%;
  border:2px solid #fff;box-shadow:0 0 0 1px #000, inset 0 0 0 1px #000;
  transform:translate(-50%,-50%);
  transition:background .05s;
}
#ref-img-wrap:hover #dropper-cursor,
#ref-img-wrap.touching #dropper-cursor{display:block}

#brand-filters{
  padding:0 14px 8px;
  display:flex;flex-wrap:wrap;gap:5px;align-items:center;
}
#brand-filters .filter-label{
  font-family:'Courier Prime',monospace;font-size:.72rem;
  color:var(--muted);margin-right:2px;flex-basis:100%;margin-bottom:2px;
}

/* ── Set filters ── */
#set-filters{display:flex;gap:5px;padding:7px 14px 0;flex-wrap:wrap}
.set-toggle{
  padding:4px 10px;border:1px solid var(--border);border-radius:2px;
  font-family:'Courier Prime',monospace;font-size:.72rem;
  cursor:pointer;background:var(--paper);color:var(--muted);
  transition:background .12s,color .12s,border-color .12s;user-select:none;
}
.set-toggle.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.set-toggle:hover:not(.on){border-color:var(--ink);color:var(--ink)}

/* Set indicator dot in list */
.set-dot{
  width:8px;height:8px;border-radius:50%;border:1.5px solid rgba(0,0,0,.2);
  flex-shrink:0;display:inline-block;margin-left:2px;
}
.set-dot.owned{border-radius:2px}

/* Set radio in add form */
.set-radio-group{display:flex;gap:8px;margin-top:5px}
.set-radio-lbl{
  display:flex;align-items:center;gap:5px;
  font-size:.75rem;cursor:pointer;color:var(--ink);
}
.set-radio-lbl input{accent-color:var(--accent);cursor:pointer}

/* ── Type filters ── */
#type-filters{
  padding:8px 14px 4px;
  display:flex;flex-wrap:wrap;gap:5px;align-items:center;
}
#type-filters .filter-label{
  font-family:'Courier Prime',monospace;font-size:.72rem;
  color:var(--muted);margin-right:2px;flex-basis:100%;margin-bottom:2px;
}
.type-toggle,.brand-toggle{
  padding:4px 10px;border:1px solid var(--border);border-radius:2px;
  font-family:'Courier Prime',monospace;font-size:.72rem;
  cursor:pointer;background:var(--paper);color:var(--muted);
  transition:background .12s,color .12s,border-color .12s;user-select:none;
}
.type-toggle.on,.brand-toggle.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.type-toggle:hover:not(.on),.brand-toggle:hover:not(.on){border-color:var(--ink);color:var(--ink)}

.type-chk{
  font-size:.75rem;display:flex;align-items:center;gap:4px;
  color:var(--ink);cursor:pointer;
}
.type-chk input{accent-color:var(--accent);cursor:pointer;}

/* ── Panel sections collapsible ── */
#panel-head{
  padding:10px 14px 9px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;
}
#panel-head h2{font-family:'Bebas Neue',sans-serif;font-weight:400;font-size:1rem;letter-spacing:.1em;flex:1}
#add-section-inner{padding:10px 14px;}
.sec-label{
  font-family:'Courier Prime',monospace;font-size:.72rem;
  color:var(--muted);margin-bottom:6px;
}
#clear-btn{
  display:flex;align-items:center;gap:6px;width:100%;
  padding:8px 14px;border:none;border-top:1px solid var(--border);
  background:transparent;color:var(--muted);
  font-family:'Courier Prime',monospace;font-size:.75rem;
  cursor:pointer;transition:background .12s,color .12s;text-align:left;
}
#clear-btn:hover{background:#fce8e6;color:var(--accent)}
#github-block{
  padding:12px 14px;border-top:2px solid var(--ink);
  display:flex;align-items:center;justify-content:space-between;gap:10px;
}
#github-link{
  display:flex;align-items:center;gap:7px;
  font-family:'Courier Prime',monospace;font-size:.72rem;
  color:var(--muted);text-decoration:none;
}
#github-link:hover{color:var(--ink)}
</style>
</head>
<body>

<header>
  <h1>PaintSpace</h1>
  <div class="header-controls">

    <div style="display:flex;align-items:center;gap:0">
      <select id="face-select">
        <option value="3d">3D — Hue · Saturation · Value</option>
        <option value="hs">Face: Hue × Saturation</option>
        <option value="hv">Face: Hue × Value</option>
        <option value="sv">Face: Saturation × Value</option>
        <option value="circle_hs">Circle: Hue + Saturation</option>
        <option value="circle_hv">Circle: Hue + Value</option>
      </select>
      <button id="face-next-btn" class="icon-btn" style="border-left:none;border-radius:0 2px 2px 0;padding:7px 9px" title="Next view">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="5,3 11,8 5,13"/>
        </svg>
      </button>
      <button id="face-flip-btn" class="icon-btn" style="border-radius:2px;padding:7px 9px;visibility:hidden" title="Flip 180°">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
          <path d="M2 8h12M10 4l4 4-4 4"/>
          <path d="M6 4L2 8l4 4"/>
        </svg>
      </button>
    </div>

    <button class="icon-btn" id="mode-toggle-btn" title="Toggle LCh / HSV colour space">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" width="13" height="13"><circle cx="8" cy="8" r="6"/><path d="M8 2a6 6 0 010 12"/><line x1="8" y1="2" x2="8" y2="14"/></svg>
      HSV
    </button>

    <button class="icon-btn" id="toggle-panel-btn" title="Toggle sidebar">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8">
        <rect x="1" y="1" width="14" height="14" rx="1.5"/>
        <line x1="10" y1="1" x2="10" y2="15"/>
      </svg>
      PANEL
    </button>

    <label class="icon-btn">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M8 2v8M5 7l3 3 3-3"/><path d="M2 12v1a1 1 0 001 1h10a1 1 0 001-1v-1"/>
      </svg>
      IMPORT
      <input type="file" id="csv-file" accept=".csv">
    </label>

    <button class="icon-btn" id="export-btn">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M8 10V2M5 5l3-3 3 3"/><path d="M2 12v1a1 1 0 001 1h10a1 1 0 001-1v-1"/>
      </svg>
      EXPORT
    </button>

  </div>
</header>

<div id="canvas-wrap">
  <canvas id="c"></canvas>
  <div id="axis-overlay"></div>
  <div id="tooltip"></div>
  <div id="hint">drag · scroll · click</div>
</div>

<div id="panel-col">
<div id="panel">

  <!-- COLOURS section -->
  <div class="section-header" id="colours-header">
    <h3>Paints</h3>
    <span id="count-label" style="font-size:.65rem;color:var(--muted);margin-right:4px">0</span>
    <svg class="chevron" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3,6 8,11 13,6"/></svg>
  </div>
  <div class="section-body" id="colours-body">
    <div id="set-filters">
      <span class="set-toggle on" data-set="owned">Owned</span>
    </div>
    <div id="type-filters">
      <div class="filter-label">Show types</div>
      <span class="type-toggle on" data-type="Normal">Normal</span>
      <span class="type-toggle on" data-type="Metallic">Metallic</span>
      <span class="type-toggle on" data-type="Air">Air</span>
      <span class="type-toggle on" data-type="Wash">Wash</span>
      <span class="type-toggle on" data-type="Contrast">Contrast</span>
      <span class="type-toggle on" data-type="Technical">Technical</span>
      <span class="type-toggle on" data-type="Fluo">Fluo</span>
    </div>
    <div id="brand-filters">
      <div class="filter-label">Show brands</div>
    </div>
    <div id="paint-search-wrap">
      <svg id="paint-search-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" width="12" height="12"><circle cx="6.5" cy="6.5" r="4"/><line x1="10" y1="10" x2="14" y2="14"/></svg>
      <input id="paint-search" placeholder="Search paints…" autocomplete="off">
      <span id="paint-search-clear" title="Clear search">×</span>
    </div>
    <div id="colour-list"></div>
    <button id="clear-btn">
      <svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><line x1="2" y1="2" x2="14" y2="14"/><line x1="14" y1="2" x2="2" y2="14"/></svg>
      Clear palette
    </button>
  </div>

  <!-- ADD COLOUR section -->
  <div class="section-header" id="add-header">
    <h3>Add Colour</h3>
    <svg class="chevron" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3,6 8,11 13,6"/></svg>
  </div>
  <div class="section-body" id="add-body">
    <div id="add-section-inner">
      <div class="add-row">
        <input id="name-input" placeholder="Name" maxlength="50">
        <input id="brand-input" placeholder="Brand" maxlength="30">
      </div>
      <div class="add-row">
        <input id="hex-input" placeholder="#rrggbb[aa]" maxlength="9">
        <button id="add-btn">ADD</button>
      </div>
      <div class="set-radio-group">
        <label class="set-radio-lbl"><input type="checkbox" id="set-owned-check" checked> Owned</label>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:2px" id="type-check-group">
        <span class="sec-label" style="flex-basis:100%;margin-bottom:2px">Types</span>
        <label class="type-chk"><input type="checkbox" value="Normal" checked> Normal</label>
        <label class="type-chk"><input type="checkbox" value="Metallic"> Metallic</label>
        <label class="type-chk"><input type="checkbox" value="Air"> Air</label>
        <label class="type-chk"><input type="checkbox" value="Wash"> Wash</label>
        <label class="type-chk"><input type="checkbox" value="Contrast"> Contrast</label>
        <label class="type-chk"><input type="checkbox" value="Technical"> Technical</label>
        <label class="type-chk"><input type="checkbox" value="Fluo"> Fluo</label>
      </div>
    </div>
  </div>

  <!-- COLOUR MATCH section -->
  <div id="match-section">
    <div class="section-header" id="match-header">
      <h3>Colour Match</h3>
      <svg class="chevron" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3,6 8,11 13,6"/></svg>
    </div>
    <div class="section-body" id="match-body">
      <div id="match-inner">
        <div id="match-row">
          <div id="match-swatch"></div>

// ═══════════════════════════════════
// COLOUR MATH
// ═══════════════════════════════════
function hexToRgb(hex){
  const h=hex.replace('#','');
  return[parseInt(h.slice(0,2),16)/255,parseInt(h.slice(2,4),16)/255,parseInt(h.slice(4,6),16)/255];
}

// ── LCh (CIELAB) ─────────────────────────────────────
function linearize(c){return c<=0.04045?c/12.92:Math.pow((c+0.055)/1.055,2.4);}
function rgbToXyz([r,g,b]){
  const rl=linearize(r),gl=linearize(g),bl=linearize(b);
  return[
    rl*0.4124564+gl*0.3575761+bl*0.1804375,
    rl*0.2126729+gl*0.7151522+bl*0.0721750,
    rl*0.0193339+gl*0.1191920+bl*0.9503041
  ];
}
function xyzToLab([x,y,z]){
  const f=t=>t>0.008856?Math.pow(t,1/3):7.787*t+16/116;
  const fx=f(x/0.95047),fy=f(y/1.00000),fz=f(z/1.08883);
  return{L:116*fy-16, a:500*(fx-fy), b:200*(fy-fz)};
}
function hexToLab(hex){return xyzToLab(rgbToXyz(hexToRgb(hex)));}
function labToLch({L,a,b}){
  const C=Math.sqrt(a*a+b*b);
  let h=Math.atan2(b,a)/(2*Math.PI);
  if(h<0)h+=1;
  return{L,C,h};
}
function hexToLch(hex){return labToLch(hexToLab(hex));}
const C_MAX=100;
function normLch({L,C,h}){return{L:L/100, C:C/C_MAX, h};}

// ΔE (CIE76)
function deltaE(hexA,hexB){
  const a=hexToLab(hexA),b=hexToLab(hexB);
  return Math.sqrt((a.L-b.L)**2+(a.a-b.a)**2+(a.b-b.b)**2);
}

// ── HSV ───────────────────────────────────────────────
function rgbToHsv([r,g,b]){
  const max=Math.max(r,g,b),min=Math.min(r,g,b),d=max-min;
  let h=0;
  if(d>0){
    if(max===r) h=((g-b)/d+6)%6;
    else if(max===g) h=(b-r)/d+2;
    else h=(r-g)/d+4;
    h/=6;
  }
  return{h,s:max>0?d/max:0,v:max};
}
function hexToHsv(hex){return rgbToHsv(hexToRgb(hex));}

// ── Colour mode ───────────────────────────────────────
let colourMode='hsv';

// Returns normalised {x:hue, y:second, z:third} for the current mode
// Accepts a hex string OR a pre-computed entry object (faster)
function getComponents(hexOrEntry){
  if(colourMode==='lch'){
    const n=typeof hexOrEntry==='string'?normLch(hexToLch(hexOrEntry)):hexOrEntry.lch;
    return{x:n.h, y:n.C, z:n.L};
  } else {
    const n=typeof hexOrEntry==='string'?hexToHsv(hexOrEntry):hexOrEntry.hsv;
    return{x:n.h, y:n.s, z:n.v};
  }
}

function makeMidGrid(){
  const pts=[];
  for(let i=0;i<=4;i++){
    const a=(i/4)*2-1;
    pts.push(new THREE.Vector3(a,-1,0),new THREE.Vector3(a,1,0));
    pts.push(new THREE.Vector3(-1,a,0),new THREE.Vector3(1,a,0));
    pts.push(new THREE.Vector3(a,0,-1),new THREE.Vector3(a,0,1));
    pts.push(new THREE.Vector3(-1,0,a),new THREE.Vector3(1,0,a));
  }
  return new THREE.LineSegments(
    new THREE.BufferGeometry().setFromPoints(pts),
    new THREE.LineBasicMaterial({color:0x272727})
  );
}
scene.add(makeMidGrid());

function makeAxisLine(dir){
  const geo=new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(0,0,0), dir.clone().multiplyScalar(1.3)
  ]);
  return new THREE.Line(geo, new THREE.LineBasicMaterial({color:0x444444}));
}
const axisX=makeAxisLine(new THREE.Vector3(1,0,0));
const axisY=makeAxisLine(new THREE.Vector3(0,1,0));
const axisZ=makeAxisLine(new THREE.Vector3(0,0,1));
scene.add(axisX); scene.add(axisY); scene.add(axisZ);

function updateAxesForFace(){
  const L=FACE_LABELS(currentFace);
  const is3d=currentFace==='3d';
  const isCircle=CIRCLE_VIEWS.has(currentFace);
  if(isCircle){
    axisX.visible=false; axisY.visible=false; axisZ.visible=false;
    return;
  }
  axisX.material.color.setHex(COMP_COLOURS(L.x)||0x444444);
  axisY.material.color.setHex(COMP_COLOURS(L.y)||0x444444);
  axisZ.material.color.setHex(COMP_COLOURS(L.z)||0x444444);
  axisX.visible=true;
  axisY.visible=true;
  axisZ.visible=is3d;
}

// ── Swatch texture generation per paint type ─────────
function hexToRgbArr(hex){
  const h=hex.replace('#','');
  return[parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];
}
function makeSwatchTexture(hex,types){
  const sz=64;
  const cv=document.createElement('canvas');
  cv.width=cv.height=sz;
  const ctx=cv.getContext('2d');
  const[r,g,b]=hexToRgbArr(hex);
  const col=`rgb(${r},${g},${b})`;
  const colA=(a)=>`rgba(${r},${g},${b},${a})`;

  if(types.includes('Metallic')){
    // Solid base
    ctx.fillStyle=col;
    ctx.fillRect(0,0,sz,sz);
    // Diagonal sheen: dark bottom-left to bright top-right
    const shine=ctx.createLinearGradient(0,sz,sz,0);
    shine.addColorStop(0,  'rgba(0,0,0,0.35)');
    shine.addColorStop(0.4,'rgba(0,0,0,0.05)');
    shine.addColorStop(0.6,'rgba(255,255,255,0.0)');
    shine.addColorStop(0.78,'rgba(255,255,255,0.55)');
    shine.addColorStop(0.88,'rgba(255,255,255,0.9)');
    shine.addColorStop(1,  'rgba(255,255,255,0.3)');
    ctx.fillStyle=shine;
    ctx.fillRect(0,0,sz,sz);
    // Small specular dot
    const sp=ctx.createRadialGradient(sz*.68,sz*.28,0,sz*.68,sz*.28,sz*.22);
    sp.addColorStop(0,'rgba(255,255,255,0.75)');
    sp.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle=sp;
    ctx.fillRect(0,0,sz,sz);

  } else if(types.includes('Air')){
    // Square swatch with colour fading to transparent at edges
    const grad=ctx.createRadialGradient(sz/2,sz/2,0,sz/2,sz/2,sz*0.7);
    grad.addColorStop(0,   colA(1));
    grad.addColorStop(0.5, colA(1));
    grad.addColorStop(0.82,colA(0.6));
    grad.addColorStop(1,   colA(0));
    ctx.fillStyle=grad;
    ctx.fillRect(0,0,sz,sz);

  } else if(types.includes('Wash')||types.includes('Contrast')){
    // 2×2 checker: TL=exact, BR=exact, TR=lighter, BL=darker
    const half=sz/2;
    // Lighten: blend toward white
    const lr=Math.min(255,Math.round(r+(255-r)*0.45));
    const lg=Math.min(255,Math.round(g+(255-g)*0.45));
    const lb=Math.min(255,Math.round(b+(255-b)*0.45));
    // Darken: blend toward black
    const dr2=Math.round(r*0.45);
    const dg2=Math.round(g*0.45);
    const db2=Math.round(b*0.45);
    // TL — exact colour
    ctx.fillStyle=col;
    ctx.fillRect(0,0,half,half);
    // TR — lighter
    ctx.fillStyle=`rgb(${lr},${lg},${lb})`;
    ctx.fillRect(half,0,half,half);
    // BL — darker
    ctx.fillStyle=`rgb(${dr2},${dg2},${db2})`;
    ctx.fillRect(0,half,half,half);
    // BR — exact colour
    ctx.fillStyle=col;
    ctx.fillRect(half,half,half,half);

  } else {
    // Normal: solid
    ctx.fillStyle=col;
    ctx.fillRect(0,0,sz,sz);
  }
  return new THREE.CanvasTexture(cv);
}

// ── Points — square (owned) or circle (tester) swatches, always facing camera ─
const sGeo=new THREE.PlaneGeometry(0.13,0.13);
const cGeo=new THREE.CircleGeometry(0.075,32); // circle for tester
const outlineGeo=new THREE.PlaneGeometry(0.175,0.175);
const outlineCircleGeo=new THREE.CircleGeometry(0.105,32);
const outlineMat=new THREE.MeshBasicMaterial({color:0xffffff,side:THREE.DoubleSide});
const pointMeshes=[];
const outlineMeshes=[];
let colours=[];

function getPos(entry){
  const c=getComponents(entry);
  const{x,y,z}=FACE_FN(currentFace)(c.x,c.y,c.z);
  return new THREE.Vector3(x,y,z);
}

function addColour(entry){
  if(/^#[0-9a-fA-F]{8}$/.test(entry.hex)) entry.hex=entry.hex.slice(0,7);
  entry.lch=normLch(hexToLch(entry.hex));
  entry.hsv=hexToHsv(entry.hex);
  if(!entry.type) entry.type=['Normal'];
  else if(!Array.isArray(entry.type)) entry.type=[entry.type];
  if(!entry.set) entry.set='owned';
  const pos=getPos(entry);
  const isTester=entry.set==='tester';

  // Outline (white, behind)
  const outline=new THREE.Mesh(
    isTester?outlineCircleGeo:outlineGeo,
    outlineMat.clone()
  );
  outline.position.copy(pos);
  outline.renderOrder=0;
  outline.visible=false;
  scene.add(outline);
  outlineMeshes.push(outline);

  // Colour swatch — texture varies by type
  const types=entry.type;
  const tex=makeSwatchTexture(entry.hex,types);
  const isAir=types.includes('Air')&&!types.includes('Metallic');
  const mat=new THREE.MeshBasicMaterial({
    map:tex,
    side:THREE.DoubleSide,
    depthTest:true,
    transparent:isAir,
    alphaTest:isAir?0.01:0,
  });
  const mesh=new THREE.Mesh(isTester?cGeo:sGeo,mat);
  mesh.position.copy(pos);
  mesh.renderOrder=1;
  mesh.userData={entry,index:colours.length};
  scene.add(mesh);
  pointMeshes.push(mesh);
  colours.push(entry);
}

// INDEXEDDB AUTO-SAVE
// ═══════════════════════════════════
const DB_NAME='paintspace', DB_VERSION=1, STORE='palette';
let db=null;

function openDB(){
  return new Promise((res,rej)=>{
    const req=indexedDB.open(DB_NAME,DB_VERSION);
    req.onupgradeneeded=e=>{
      e.target.result.createObjectStore(STORE,{keyPath:'id'});
    };
    req.onsuccess=e=>{db=e.target.result;res(db);};
    req.onerror=e=>rej(e);
  });
}

function dbSave(){
  if(!db) return;
  const tx=db.transaction(STORE,'readwrite');
  const store=tx.objectStore(STORE);
  store.clear();
  colours.forEach((c,i)=>{
    store.put({
      id:i,
      name:c.name, brand:c.brand||'', hex:c.hex,
      type:c.type, set:c.set||'owned'
    });
  });
  tx.oncomplete=()=>showSaved();
}

function dbLoad(){
  return new Promise(res=>{
    if(!db){res([]);return;}
    const tx=db.transaction(STORE,'readonly');
    const req=tx.objectStore(STORE).getAll();
    req.onsuccess=e=>res(e.target.result||[]);
    req.onerror=()=>res([]);
  });
}

// "Saved" toast indicator
function showSaved(){
  let toast=document.getElementById('save-toast');
  if(!toast){
    toast=document.createElement('div');
    toast.id='save-toast';
    toast.style.cssText=`position:fixed;bottom:14px;right:18px;padding:5px 12px;
      background:var(--ink);color:var(--paper);font-family:'Bebas Neue',sans-serif;
      font-size:.72rem;letter-spacing:.08em;border-radius:2px;
      opacity:0;transition:opacity .3s;pointer-events:none;z-index:999`;
    toast.textContent='SAVED';
    document.body.appendChild(toast);
  }
  toast.style.opacity='1';
  clearTimeout(toast._t);
  toast._t=setTimeout(()=>toast.style.opacity='0',1400);
}

// Debounced save — batches rapid changes
let _saveTimer=null;
function scheduleSave(){
  clearTimeout(_saveTimer);
  _saveTimer=setTimeout(dbSave,600);
}

// Initialise: load from DB or fall back to INITIAL
openDB().then(()=>dbLoad()).then(saved=>{
  if(saved.length>0){
    saved.sort((a,b)=>a.id-b.id).forEach(addColour);
  } else {
    INITIAL.forEach(addColour);
  }
  postLoad();
}).catch(()=>{
  INITIAL.forEach(addColour);
  postLoad();
});

function postLoad(){
  rebuildBrandFilters();
  updateFilterCounts();
  renderList();
  computeGap();
}

const enabledBrands=new Set();
const enabledTypes=new Set(['Normal','Metallic','Air','Wash','Contrast','Technical','Fluo']);
const enabledSets=new Set(['owned']);

function rebuildBrandFilters(){
  const container=document.getElementById('brand-filters');
  const allBrands=[...new Set(colours.map(c=>c.brand||'').filter(Boolean))].sort();
  allBrands.forEach(b=>{ if(!enabledBrands.has(b)) enabledBrands.add(b); });
  container.innerHTML='<div class="filter-label">Show brands</div>';
  allBrands.forEach(brand=>{
    const btn=document.createElement('span');
    btn.className='brand-toggle'+(enabledBrands.has(brand)?' on':'');
    btn.dataset.brand=brand;
    btn.textContent=brand;
    btn.addEventListener('click',()=>{
      if(enabledBrands.has(brand)){enabledBrands.delete(brand);btn.classList.remove('on');}
      else{enabledBrands.add(brand);btn.classList.add('on');}
      applyVisibility();
      if(currentMatchHex) runColourMatch(currentMatchHex);
    });
    container.appendChild(btn);
  });
}

let currentMatchHex=null; // persists across view changes

function rebuildPositions(){
  pointMeshes.forEach((mesh,i)=>{
    const t=getPos(colours[i]);
    mesh.userData._target=t;
    outlineMeshes[i].userData._target=t.clone();
  });
  // Immediately reposition target marker if match is active
  if(currentMatchHex&&targetMarker.visible){
    const tc=getComponents(currentMatchHex);
    const{x,y,z}=FACE_FN(currentFace)(tc.x,tc.y,tc.z);
    targetMarker.userData._target=new THREE.Vector3(x,y,z);
    targetOutline.userData._target=new THREE.Vector3(x,y,z);
  }
}

// CAMERA / ORBIT
// ═══════════════════════════════════
let theta=0.6,phi=1.0,radius=5.5;

function updateCamera(){
  camera.position.set(
    radius*Math.sin(phi)*Math.sin(theta),
    radius*Math.cos(phi),
    radius*Math.sin(phi)*Math.cos(theta)
  );
  camera.lookAt(0,0,0);
}
updateCamera();

let isDragging=false,prevX=0,prevY=0,dragMoved=false;
wrap.addEventListener('mousedown',e=>{isDragging=true;prevX=e.clientX;prevY=e.clientY;dragMoved=false;});
window.addEventListener('mouseup',()=>{isDragging=false;});
window.addEventListener('mousemove',e=>{
  if(!isDragging)return;
  const dx=e.clientX-prevX,dy=e.clientY-prevY;
  if(Math.abs(dx)+Math.abs(dy)>2)dragMoved=true;
  theta-=dx*0.007;
  phi=Math.max(0.05,Math.min(Math.PI-0.05,phi+dy*0.007));
  prevX=e.clientX;prevY=e.clientY;
  updateCamera();
});
wrap.addEventListener('wheel',e=>{
  e.preventDefault();
  radius=Math.max(2.5,Math.min(10,radius+e.deltaY*0.012));
  updateCamera();
},{passive:false});

let lastTouch=null;
wrap.addEventListener('touchstart',e=>{if(e.touches.length===1)lastTouch=e.touches[0];},{passive:true});
wrap.addEventListener('touchmove',e=>{
  if(e.touches.length!==1||!lastTouch)return;
  theta-=(e.touches[0].clientX-lastTouch.clientX)*0.01;
  phi=Math.max(0.05,Math.min(Math.PI-0.05,phi+(e.touches[0].clientY-lastTouch.clientY)*0.01));
  lastTouch=e.touches[0];
  updateCamera();
},{passive:true});

// RAYCASTING
// ═══════════════════════════════════
const raycaster=new THREE.Raycaster();
const mouse=new THREE.Vector2();
const tooltip=document.getElementById('tooltip');
let hoveredMesh=null;

function setMouse(e){
  const r=wrap.getBoundingClientRect();
  mouse.x=((e.clientX-r.left)/r.width)*2-1;
  mouse.y=-((e.clientY-r.top)/r.height)*2+1;
}

wrap.addEventListener('mousemove',e=>{
  setMouse(e);
  raycaster.setFromCamera(mouse,camera);
  const hits=raycaster.intersectObjects(pointMeshes).filter(h=>h.object.visible);
  if(hits.length){
    const m=hits[0].object;
    if(m!==hoveredMesh){
      hoveredMesh=m;
      const{entry}=m.userData;
      const badge=colourMode==='lch'
        ?`L\u200a${Math.round(entry.lch.L*100)}&emsp;C\u200a${Math.round(entry.lch.C*C_MAX)}&emsp;H\u200a${Math.round(entry.lch.h*360)}°`
        :`H\u200a${Math.round(entry.hsv.h*360)}°&emsp;S\u200a${Math.round(entry.hsv.s*100)}%&emsp;V\u200a${Math.round(entry.hsv.v*100)}%`;
      tooltip.innerHTML=`<strong>${entry.name}</strong><br><em style="color:#999">${entry.brand||''}</em><br><br>${badge}<br>${entry.hex}`;
      tooltip.style.borderLeftColor=entry.hex;
    }
    const r2=wrap.getBoundingClientRect();
    tooltip.style.cssText+=`;display:block;left:${e.clientX-r2.left+16}px;top:${e.clientY-r2.top-10}px`;
    wrap.style.cursor='pointer';
  } else {
    hoveredMesh=null;
    tooltip.style.display='none';
    wrap.style.cursor='grab';
  }
});

wrap.addEventListener('click',e=>{
  if(dragMoved)return;
  setMouse(e);
  raycaster.setFromCamera(mouse,camera);
  const hits=raycaster.intersectObjects(pointMeshes).filter(h=>h.object.visible);
  if(hits.length)highlightItem(hits[0].object.userData.index);
});

const list=document.getElementById('colour-list');
const countLabel=document.getElementById('count-label');
let activeIndex=-1;
let paintSearchQuery='';

// Search bar wiring
const paintSearchEl=document.getElementById('paint-search');
const paintSearchClear=document.getElementById('paint-search-clear');
paintSearchEl.addEventListener('input',function(){
  paintSearchQuery=this.value.trim().toLowerCase();
  paintSearchClear.style.display=paintSearchQuery?'block':'none';
  renderList();
});
paintSearchClear.addEventListener('click',()=>{
  paintSearchEl.value='';
  paintSearchQuery='';
  paintSearchClear.style.display='none';
  renderList();
  paintSearchEl.focus();
});

function renderList(){
  list.innerHTML='';
  let shown=0;
  colours.forEach((c,i)=>{
    // Only show what's visible on the cube
    if(!pointMeshes[i]||!pointMeshes[i].visible) return;
    // Apply search filter (list-only, does not affect cube)
    if(paintSearchQuery){
      const typeArr=Array.isArray(c.type)?c.type:[c.type||'Normal'];
      const haystack=(c.name+' '+(c.brand||'')+' '+typeArr.join(' ')+' '+c.hex).toLowerCase();
      if(!haystack.includes(paintSearchQuery)) return;
    }
    shown++;
    const badge=colourMode==='lch'
      ?`L${Math.round(c.lch.L*100)} C${Math.round(c.lch.C*C_MAX)} H${Math.round(c.lch.h*360)}°`
      :`H${Math.round(c.hsv.h*360)}° S${Math.round(c.hsv.s*100)} V${Math.round(c.hsv.v*100)}`;
    const div=document.createElement('div');
    div.className='colour-item'+(i===activeIndex?' active':'');
    div.dataset.index=i;
    const typeArr=Array.isArray(c.type)?c.type:[c.type||'Normal'];
    const tags=typeArr.map(t=>`<span class="type-tag">${t}</span>`).join('');
    const setDot=`<span class="set-dot ${c.set||'owned'}" style="background:${c.hex}"></span>`;
    div.innerHTML=
      `<div class="swatch" style="background:${c.hex};border-radius:${c.set==='tester'?'50%':'3px'}"></div>`+
      `<div class="colour-meta">`+
        `<div class="colour-name">${c.name}</div>`+
        `<div class="colour-brand"><span>${c.brand||''}</span>${tags}</div>`+
      `</div>`+
      `<div class="hsv-badge">${badge}</div>`;
    div.addEventListener('click',()=>highlightItem(i));
    list.appendChild(div);
  });
  countLabel.textContent=shown;
}

function highlightItem(i){
  if(activeIndex>=0&&outlineMeshes[activeIndex]) outlineMeshes[activeIndex].visible=false;
  activeIndex=i;
  if(outlineMeshes[i]) outlineMeshes[i].visible=true;
  renderList();
  // Find the rendered row for this index and scroll to it
  const el=list.querySelector(`[data-index="${i}"]`);
  if(el) el.scrollIntoView({block:'nearest',behavior:'smooth'});
  const mesh=pointMeshes[i];
  let t=0;
  const pulse=()=>{
    t+=0.18;
    mesh.scale.setScalar(Math.max(0.2,1+Math.sin(t)*0.7*Math.exp(-t*.28)));
    if(t<7)requestAnimationFrame(pulse);
    else mesh.scale.setScalar(1);
  };
  pulse();
}

// AXIS OVERLAY LABELS
// ═══════════════════════════════════
const axisOverlay=document.getElementById('axis-overlay');

function project(v3){
  const v=v3.clone().project(camera);
  const r=wrap.getBoundingClientRect();
  return{x:(v.x*.5+.5)*r.width, y:(-v.y*.5+.5)*r.height};
}

function updateAxisLabels(){
  axisOverlay.innerHTML='';
  updateAxesForFace();

  const L=FACE_LABELS(currentFace);
  const is3d=currentFace==='3d';
  const isCircle=CIRCLE_VIEWS.has(currentFace);

  if(isCircle){
    // Representative hex for each hue name — derive actual angle from current mode
    const hueLabels=[
      {name:'RED',     hex:'#ff0000', color:'#ff4444'},
      {name:'YELLOW',  hex:'#ffff00', color:'#ffee00'},
      {name:'GREEN',   hex:'#00ff00', color:'#44cc44'},
      {name:'CYAN',    hex:'#00ffff', color:'#22cccc'},
      {name:'BLUE',    hex:'#0000ff', color:'#4488ff'},
      {name:'MAGENTA', hex:'#ff00ff', color:'#cc44cc'},
    ];
    hueLabels.forEach(({name,hex,color})=>{
      // Get the actual hue angle for this colour in the current mode
      const hAngle=colourMode==='lch'
        ? normLch(hexToLch(hex)).h * Math.PI * 2
        : hexToHsv(hex).h * Math.PI * 2;
      const pos=new THREE.Vector3(Math.cos(hAngle)*1.25, Math.sin(hAngle)*1.25, 0);
      if(pos.clone().project(camera).z>1) return;
      const s=project(pos);
      const el=document.createElement('div');
      el.className='ax-label'; el.textContent=name; el.style.color=color;
      el.style.left=s.x+'px'; el.style.top=s.y+'px';
      axisOverlay.appendChild(el);
    });
    const radLabel=colourMode==='lch'
      ?(currentFace==='circle_hs'?'CHROMA':'LIGHTNESS')
      :(currentFace==='circle_hs'?'SATURATION':'VALUE');
    const rPos=new THREE.Vector3(1.45,0,0);
    if(rPos.clone().project(camera).z<=1){
      const s=project(rPos);
      const el=document.createElement('div');
      el.className='ax-label'; el.textContent=radLabel;
      el.style.color=AXIS_COLOURS(radLabel);
      el.style.left=s.x+'px'; el.style.top=s.y+'px';
      axisOverlay.appendChild(el);
    }
    return;
  }

  // Label X and Y tips; also Z in 3D view
  const tips=[
    {pos:new THREE.Vector3(1.45,0,0),    label:L.x},
    {pos:new THREE.Vector3(0,1.45,0),    label:L.y},
  ];
  if(is3d) tips.push({pos:new THREE.Vector3(0,0,1.45), label:L.z});

  tips.forEach(({pos,label})=>{
    if(!label) return;
    if(pos.clone().project(camera).z>1) return;
    const s=project(pos);
    const el=document.createElement('div');
    el.className='ax-label'; el.textContent=label;
    el.style.color=AXIS_COLOURS(label)||'rgba(200,200,200,.5)';
    el.style.left=s.x+'px'; el.style.top=s.y+'px';
    axisOverlay.appendChild(el);
  });
}

const faceSelect=document.getElementById('face-select');
const flipBtn=document.getElementById('face-flip-btn');
function applyFaceChange(){
  currentFace=faceSelect.value;
  const isCircle=CIRCLE_VIEWS.has(currentFace);
  const isFace=currentFace!=='3d'&&!isCircle;
  circleGuides.visible=isCircle;
  cubeGuides.forEach(o=>{ if(o.visible!==undefined) o.visible=!isCircle; });
  flipBtn.style.visibility=isFace?'visible':'hidden';
  updateAxesForFace();
  rebuildPositions();
  const cam=FACE_CAM[currentFace];
  if(cam){theta=cam.theta;phi=cam.phi;radius=cam.r;updateCamera();}
}
faceSelect.addEventListener('change',applyFaceChange);

  faceSelect.selectedIndex=(faceSelect.selectedIndex+1)%faceSelect.options.length;
  applyFaceChange();
});

  theta+=Math.PI; // rotate 180° around Y axis (east)
  updateCamera();
});

// CSV IMPORT
// ═══════════════════════════════════
document.getElementById('csv-file').addEventListener('change',function(){
  const file=this.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const lines=e.target.result.split(/\r?\n/).filter(l=>l.trim());
    if(!lines.length)return;
    const firstLow=lines[0].toLowerCase();
    const dataLines=(firstLow.includes('name')||firstLow.includes('hex')||firstLow.includes('brand'))
      ?lines.slice(1):lines;
    let added=0;
    dataLines.forEach(line=>{
      const cols=line.split(',').map(c=>c.trim().replace(/^"|"$/g,''));
      let hex=null;
      cols.forEach(c=>{if(/^#?[0-9a-fA-F]{6}([0-9a-fA-F]{2})?$/.test(c)){hex=(c.startsWith('#')?c:'#'+c).slice(0,7);}});
      if(!hex)return;
      const strs=cols.filter(c=>!/^#?[0-9a-fA-F]{6}([0-9a-fA-F]{2})?$/.test(c)&&!/^\d+(\.\d+)?$/.test(c)&&c.length>0);
      const TYPES=['Normal','Metallic','Air','Wash','Contrast','Technical','Fluo'];
      const typeCol=strs.find(s=>s.split(/[|;]/).map(t=>t.trim()).some(t=>TYPES.includes(t)));
      const typeArr=typeCol
        ?typeCol.split(/[|;,]/).map(t=>t.trim()).filter(t=>TYPES.includes(t))
        :['Normal'];
      // Set: '1' or 'owned' → owned; blank or anything else → tester
      const rawCols=cols.map(c=>c.trim().replace(/^"|"$/g,''));
      const setCol=rawCols.find(c=>c==='1'||c.toLowerCase()==='owned'||c.toLowerCase()==='tester');
      const setVal=(setCol==='1'||setCol?.toLowerCase()==='owned')?'owned':'tester';
      const nameStrs=strs.filter(s=>s!==typeCol&&s!=='1'&&s.toLowerCase()!=='owned'&&s.toLowerCase()!=='tester');
      addColour({name:nameStrs[0]||'Unnamed',brand:nameStrs[1]||'',hex,type:typeArr.length?typeArr:['Normal'],set:setVal});
      added++;
    });
    renderList();
    rebuildBrandFilters();
    updateFilterCounts();
    applyVisibility();
    scheduleSave();
    this.value='';
    if(!added)alert('No valid colours found.\nExpected a column with a #hex code.');
  };
  reader.readAsText(file);
});

// ═══════════════════════════════════
// COLOUR MATCH
// ═══════════════════════════════════
// Distance — always ΔE for 'all', mode-specific for individual axes
function colourDist(hexA,hexB){ return deltaE(hexA,hexB); }

let matchBy='all';

function lchDist(hexA,hexB){
  if(colourMode==='lch'){
    const a=normLch(hexToLch(hexA)), b=normLch(hexToLch(hexB));
    const dh=Math.min(Math.abs(a.h-b.h),1-Math.abs(a.h-b.h));
    return{ all:deltaE(hexA,hexB), hue:dh, sat:Math.abs(a.C-b.C), val:Math.abs(a.L-b.L) };
  } else {
    const a=hexToHsv(hexA), b=hexToHsv(hexB);
    const dh=Math.min(Math.abs(a.h-b.h),1-Math.abs(a.h-b.h));
    return{ all:deltaE(hexA,hexB), hue:dh, sat:Math.abs(a.s-b.s), val:Math.abs(a.v-b.v) };
  }
}

// Target marker — diamond = plane rotated 45° in Z, coloured to match input
const targetGeo=new THREE.PlaneGeometry(0.18,0.18);
const targetMat=new THREE.MeshBasicMaterial({
  color:0xffffff, side:THREE.DoubleSide, transparent:true, opacity:0.95
});
const targetMarker=new THREE.Mesh(targetGeo,targetMat);
targetMarker.rotation.z=Math.PI/4;  // 45° → diamond shape
targetMarker.visible=false;
scene.add(targetMarker);

// Connector lines from target to nearest matches
// Live connector lines — rebuilt every frame from current mesh positions
let connectorData=[]; // [{line, meshIndex, color}]
function clearConnectors(){
  connectorData.forEach(({line})=>scene.remove(line));
  connectorData.length=0;
}
function addConnector(meshIndex,color){
  const geo=new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(),new THREE.Vector3()
  ]);
  const mat=new THREE.LineBasicMaterial({color,transparent:true,opacity:.55});
  const line=new THREE.Line(geo,mat);
  scene.add(line);
  connectorData.push({line,meshIndex});
}
function updateConnectors(){
  if(!connectorData.length||!targetMarker.visible) return;
  const tPos=targetMarker.position;
  connectorData.forEach(({line,meshIndex})=>{
    const mPos=pointMeshes[meshIndex].position;
    const pos=line.geometry.attributes.position;
    pos.setXYZ(0,tPos.x,tPos.y,tPos.z);
    pos.setXYZ(1,mPos.x,mPos.y,mPos.z);
    pos.needsUpdate=true;
    line.geometry.computeBoundingSphere();
  });
}

// Single source of truth for mesh visibility
function updateFilterCounts(){
  // Type toggles: count paints matching that type respecting all OTHER filters
  document.querySelectorAll('.type-toggle[data-type]').forEach(btn=>{
    const t=btn.dataset.type;
    const total=colours.filter(c=>{
      const types=Array.isArray(c.type)?c.type:[c.type||'Normal'];
      return types.includes(t);
    }).length;
    const current=colours.filter(c=>{
      const types=Array.isArray(c.type)?c.type:[c.type||'Normal'];
      if(!types.includes(t)) return false;
      const setOk=c.set==='tester'||enabledSets.has('owned');
      const brandOk=!c.brand||enabledBrands.has(c.brand);
      return setOk&&brandOk;
    }).length;
    btn.textContent=current<total?`${t} ${current}/${total}`:`${t} ${total}`;
  });
  // Brand toggles: count paints from that brand respecting all OTHER filters
  document.querySelectorAll('.brand-toggle[data-brand]').forEach(btn=>{
    const brand=btn.dataset.brand;
    const total=colours.filter(c=>(c.brand||'')===brand).length;
    const current=colours.filter(c=>{
      if((c.brand||'')!==brand) return false;
      const types=Array.isArray(c.type)?c.type:[c.type||'Normal'];
      const typeOk=types.every(t=>enabledTypes.has(t));
      const setOk=c.set==='tester'||enabledSets.has('owned');
      return typeOk&&setOk;
    }).length;
    btn.textContent=current<total?`${brand} ${current}/${total}`:`${brand} ${total}`;
  });
}

function applyVisibility(){
  pointMeshes.forEach((mesh,i)=>{
    const c=colours[i];
    const types=Array.isArray(c.type)?c.type:[c.type||'Normal'];
    const typeOk=types.every(t=>enabledTypes.has(t));
    const setOk=c.set==='tester'||enabledSets.has('owned');
    const brandOk=!c.brand||enabledBrands.has(c.brand);
    const matchOk=!matchActive||matchVisibleSet.has(i);
    const show=typeOk&&setOk&&brandOk&&matchOk;
    mesh.visible=show;
    outlineMeshes[i].visible=show&&(i===activeIndex);
  });
  updateFilterCounts();
  renderList();
  computeGap();
}

// ═══════════════════════════════════
// GAP ANALYSIS
// ═══════════════════════════════════
const PAGE_SIZE=5;
let gapPage=0;
let gapRanked=[]; // full sorted list of {tester, minDist, nearest}

function computeGap(){
  // Use only currently visible paints (respects all active filters)
  const owned =colours.filter((_,i)=>pointMeshes[i]&&pointMeshes[i].visible&&colours[i].set==='owned');
  const testers=colours.filter((_,i)=>pointMeshes[i]&&pointMeshes[i].visible&&colours[i].set==='tester');

  const sec=document.getElementById('gap-section');
  if(!testers.length){ sec.style.display='none'; return; }
  const firstShow=sec.style.display==='none';
  sec.style.display='';
  if(firstShow) initCollapsible('gap-header','gap-body');

  // For each visible tester, find min distance to any visible owned paint
  gapRanked=testers.map(t=>{
    let minDist=Infinity, nearest=null;
    owned.forEach(o=>{
      const d=colourDist(t.hex,o.hex);
      if(d<minDist){minDist=d;nearest=o;}
    });
    // If no owned paints visible, minDist stays Infinity
    return{tester:t, minDist:isFinite(minDist)?minDist:0, nearest};
  }).sort((a,b)=>b.minDist-a.minDist);

  gapPage=0;
  renderGap();
}

function renderGap(){
  const resultsEl=document.getElementById('gap-results');
  const pagEl=document.getElementById('gap-pagination');
  const totalPages=Math.ceil(gapRanked.length/PAGE_SIZE)||1;
  const page=gapRanked.slice(gapPage*PAGE_SIZE,(gapPage+1)*PAGE_SIZE);

  resultsEl.innerHTML='';
  page.forEach(({tester,minDist,nearest})=>{
    const pct=Math.round(Math.max(0,(1-minDist/100))*100);
    const div=document.createElement('div');
    div.className='gap-item';
    div.style.cursor='pointer';
    const typeArr=Array.isArray(tester.type)?tester.type:[tester.type||'Normal'];
    const tags=typeArr.map(t=>`<span class="type-tag">${t}</span>`).join('');
    div.innerHTML=
      `<div class="swatch" style="background:${tester.hex};border-radius:50%"></div>`+
      `<div class="colour-meta">`+
        `<div class="colour-name">${tester.name}</div>`+
        `<div class="colour-brand"><span>${tester.brand||''}</span>${tags}</div>`+
        `<div style="font-size:.58rem;color:var(--muted);margin-top:1px">Nearest owned: ${nearest?nearest.name:'—'}</div>`+
      `</div>`+
      `<div class="gap-dist">Δ${Math.round(minDist*100)}<br>${pct}%</div>`;
    // Click: select this paint in the cube and paints list
    const idx=colours.indexOf(tester);
    if(idx>=0) div.addEventListener('click',()=>{
      highlightItem(idx);
      // Scroll the paints panel section into view
      const el=list.querySelector(`[data-index="${idx}"]`);
      if(el) el.scrollIntoView({block:'nearest',behavior:'smooth'});
    });
    resultsEl.appendChild(div);
  });

  // Arrow pagination
  pagEl.innerHTML='';
  if(totalPages>1){
    const prev=document.createElement('span');
    prev.className='page-btn'+(gapPage===0?' disabled':'');
    prev.innerHTML='&#8249;';
    prev.style.fontSize='1rem';
    prev.addEventListener('click',()=>{if(gapPage>0){gapPage--;renderGap();}});

    const info=document.createElement('span');
    info.className='page-info';
    info.textContent=` ${gapPage+1} of ${totalPages} `;

    const next=document.createElement('span');
    next.className='page-btn'+(gapPage>=totalPages-1?' disabled':'');
    next.innerHTML='&#8250;';
    next.style.fontSize='1rem';
    next.addEventListener('click',()=>{if(gapPage<totalPages-1){gapPage++;renderGap();}});

    pagEl.appendChild(prev);
    pagEl.appendChild(info);
    pagEl.appendChild(next);
  }
}

function runColourMatch(hex){
  // clear previous
  matchHighlightIndices.forEach(i=>{
    pointMeshes[i].scale.setScalar(1);
  });
  matchHighlightIndices=[];
  clearConnectors();
  targetMarker.visible=false;
  targetOutline.visible=false;
  matchActive=false;
  matchVisibleSet=null;
  currentMatchHex=null;
  if(!/^#[0-9a-fA-F]{6}([0-9a-fA-F]{2})?$/.test(hex)){
    applyVisibility();
    return;
  }

  // Compute distances — only among type-enabled colours
  const ranked=colours
    .map((c,i)=>({i, c, dist:lchDist(hex,c.hex)[matchBy]}))
    .filter(({c})=>{ const types=Array.isArray(c.type)?c.type:[c.type||'Normal']; return types.every(t=>enabledTypes.has(t)); })
    .filter(({c})=>c.set==='tester'||enabledSets.has('owned'))
    .filter(({c})=>!c.brand||enabledBrands.has(c.brand))
    .sort((a,b)=>a.dist-b.dist).slice(0,5);

  matchActive=true;
  matchVisibleSet=new Set(ranked.map(r=>r.i));
  currentMatchHex=hex;
  applyVisibility();

  // Position target marker + outline
  const tc=getComponents(hex);
  const{x:tx,y:ty,z:tz}=FACE_FN(currentFace)(tc.x,tc.y,tc.z);
  targetMarker.position.set(tx,ty,tz);
  targetOutline.position.set(tx,ty,tz);
  targetMarker.material.color.set(hex);
  targetMarker.visible=true;
  targetOutline.visible=true;

  const tPos=targetMarker.position;

  // Scale nearest meshes and draw connectors
  ranked.forEach(({i,c,dist},rank)=>{
    const mesh=pointMeshes[i];
    mesh.scale.setScalar(rank===0?2.2:1.6);
    matchHighlightIndices.push(i);
    addConnector(i, new THREE.Color(c.hex).getHex());
  });

  // Render match results list
  const resultsEl=document.getElementById('match-results');
  resultsEl.innerHTML='';
  ranked.forEach(({c,dist},rank)=>{
    const maxDist={all:100, hue:0.5, sat:1, val:1}[matchBy]||100;
    const pct=Math.round(Math.max(0,(1-dist/maxDist))*100);
    const div=document.createElement('div');
    div.className='match-item'+(rank===0?' rank-1':'');
    div.innerHTML=
      `<div class="match-swatch" style="background:${c.hex}"></div>`+
      `<div class="match-meta">`+
        `<div class="match-name">${c.name}</div>`+
        `<div class="match-brand">${c.brand||''}</div>`+
      `</div>`+
      `<div class="match-dist">${pct}% match<br>${c.hex}</div>`;
    div.addEventListener('click',()=>highlightItem(colours.indexOf(c)));
    resultsEl.appendChild(div);
  });
}

const matchHexEl=document.getElementById('match-hex');
const matchSwatchEl=document.getElementById('match-swatch');

matchHexEl.addEventListener('input',function(){
  let val=this.value.trim();
  if(val===''){ clearMatch(); return; }
  if(!val.startsWith('#'))val='#'+val;
  if(/^#[0-9a-fA-F]{6}([0-9a-fA-F]{2})?$/.test(val)){
    this.style.borderColor='';
    matchSwatchEl.style.background=val;
    runColourMatch(val);
  } else {
    matchSwatchEl.style.background='#888';
    if(val.length>1)this.style.borderColor='var(--accent)';
  }
});
function clearMatch(){
  matchHexEl.value='';
  matchSwatchEl.style.background='#888';
  matchHexEl.style.borderColor='';
  document.getElementById('match-results').innerHTML='';
  matchHighlightIndices.forEach(i=>pointMeshes[i].scale.setScalar(1));
  matchHighlightIndices=[];
  clearConnectors();
  targetMarker.visible=false;
  targetOutline.visible=false;
  matchActive=false;
  matchVisibleSet=null;
  currentMatchHex=null;
  // Deselect active item
  if(activeIndex>=0&&outlineMeshes[activeIndex]) outlineMeshes[activeIndex].visible=false;
  activeIndex=-1;
  renderList();
  applyVisibility();
}

matchHexEl.addEventListener('keydown',e=>{

});

// COLLAPSIBLE SECTIONS
// ═══════════════════════════════════
function initCollapsible(headerId, bodyId){
  const header=document.getElementById(headerId);
  const body=document.getElementById(bodyId);
  // Start expanded with no cap
  body.style.maxHeight='none';
  header.addEventListener('click',()=>{
    const isCollapsed=header.classList.contains('collapsed');
    if(isCollapsed){
      // Expand: animate from 0 to scrollHeight then release to none
      body.classList.remove('collapsed');
      header.classList.remove('collapsed');
      body.style.maxHeight=body.scrollHeight+'px';
      setTimeout(()=>{ body.style.maxHeight='none'; },260);
    } else {
      // Collapse: snapshot height then animate to 0
      body.style.maxHeight=body.scrollHeight+'px';
      requestAnimationFrame(()=>{
        requestAnimationFrame(()=>{
          body.style.maxHeight='0';
          body.classList.add('collapsed');
          header.classList.add('collapsed');
        });
      });
    }
  });
}
initCollapsible('colours-header','colours-body');
initCollapsible('add-header','add-body');
initCollapsible('match-header','match-body');

// ═══════════════════════════════════
// REFERENCE IMAGE + EYEDROPPER
// ═══════════════════════════════════
const refFile=document.getElementById('ref-file');
const refImgWrap=document.getElementById('ref-img-wrap');
const refImg=document.getElementById('ref-img');
const dropperCursor=document.getElementById('dropper-cursor');

// Off-screen canvas for pixel sampling
const offCanvas=document.createElement('canvas');
const offCtx=offCanvas.getContext('2d');

refFile.addEventListener('change',function(){
  const file=this.files[0];
  if(!file)return;
  const url=URL.createObjectURL(file);
  refImg.onload=()=>{
    offCanvas.width=refImg.naturalWidth;
    offCanvas.height=refImg.naturalHeight;
    offCtx.drawImage(refImg,0,0);
    refImgWrap.classList.add('loaded');
    // Ensure match section is expanded and uncapped
    const matchHeader=document.getElementById('match-header');
    const matchBody=document.getElementById('match-body');
    if(matchHeader.classList.contains('collapsed')){
      matchHeader.classList.remove('collapsed');
      matchBody.classList.remove('collapsed');
    }
    matchBody.style.maxHeight='none';
  };
  refImg.src=url;
  this.value='';
});

function samplePixel(e){
  const rect=refImgWrap.getBoundingClientRect();
  const xRatio=(e.clientX-rect.left)/rect.width;
  const yRatio=(e.clientY-rect.top)/rect.height;
  const px=Math.floor(xRatio*offCanvas.width);
  const py=Math.floor(yRatio*offCanvas.height);
  const data=offCtx.getImageData(Math.max(0,Math.min(px,offCanvas.width-1)),
                                  Math.max(0,Math.min(py,offCanvas.height-1)),1,1).data;
  return '#'+[data[0],data[1],data[2]].map(v=>v.toString(16).padStart(2,'0')).join('');
}

function moveCursor(e){
  const rect=refImgWrap.getBoundingClientRect();
  dropperCursor.style.left=(e.clientX-rect.left)+'px';
  dropperCursor.style.top=(e.clientY-rect.top)+'px';
  const hex=samplePixel(e);
  dropperCursor.style.background=hex;
}

refImgWrap.addEventListener('mousemove',moveCursor);
refImgWrap.addEventListener('click',e=>{
  const hex=samplePixel(e);
  matchHexEl.value=hex;
  matchSwatchEl.style.background=hex;
  runColourMatch(hex);
});

// Touch support
refImgWrap.addEventListener('touchstart',e=>{
  e.preventDefault();
  refImgWrap.classList.add('touching');
  moveCursor(e.touches[0]);
},{passive:false});
refImgWrap.addEventListener('touchmove',e=>{
  e.preventDefault();
  moveCursor(e.touches[0]);
},{passive:false});
refImgWrap.addEventListener('touchend',e=>{
  e.preventDefault();
  refImgWrap.classList.remove('touching');
  const hex=samplePixel(e.changedTouches[0]);
  matchHexEl.value=hex;
  matchSwatchEl.style.background=hex;
  runColourMatch(hex);
},{passive:false});

// ═══════════════════════════════════
// RESIZE
// ═══════════════════════════════════
function resize(){
  const w=wrap.clientWidth,h=wrap.clientHeight;
  renderer.setSize(w,h,false);
  camera.aspect=w/h;
  camera.updateProjectionMatrix();
}
new ResizeObserver(resize).observe(wrap);
resize();

// ═══════════════════════════════════
// RENDER LOOP
// ═══════════════════════════════════
(function animate(){
  requestAnimationFrame(animate);
  // lerp points to target positions
  pointMeshes.forEach(mesh=>{
    if(mesh.userData._target){
      mesh.position.lerp(mesh.userData._target,.1);
      if(mesh.position.distanceTo(mesh.userData._target)<.001){
        mesh.position.copy(mesh.userData._target);
        delete mesh.userData._target;
      }
    }
  });
  // Billboard: all swatches + outlines + target face the camera
  const camQuat=camera.quaternion;
  pointMeshes.forEach((mesh,i)=>{
    mesh.quaternion.copy(camQuat);
    outlineMeshes[i].quaternion.copy(camQuat);
  });
  outlineMeshes.forEach(m=>{
    if(m.userData._target){
      m.position.lerp(m.userData._target,.1);
      if(m.position.distanceTo(m.userData._target)<.001){
        m.position.copy(m.userData._target);
        delete m.userData._target;
      }
    }
  });
  if(targetMarker.visible){
    const diamondRot=new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,0,1),Math.PI/4);
    targetMarker.quaternion.copy(camQuat).multiply(diamondRot);
    targetOutline.quaternion.copy(camQuat).multiply(diamondRot);
    if(!targetOutline.userData._target)
      targetOutline.position.copy(targetMarker.position);
  }

  if(targetMarker.visible&&targetMarker.userData._target){
    targetMarker.position.lerp(targetMarker.userData._target,.1);
    if(targetMarker.position.distanceTo(targetMarker.userData._target)<.001){
      targetMarker.position.copy(targetMarker.userData._target);
      delete targetMarker.userData._target;
    }
  }
  if(targetOutline.visible&&targetOutline.userData._target){
    targetOutline.position.lerp(targetOutline.userData._target,.1);
    if(targetOutline.position.distanceTo(targetOutline.userData._target)<.001){
      targetOutline.position.copy(targetOutline.userData._target);
      delete targetOutline.userData._target;
    }
  }
  updateConnectors();
  updateAxisLabels();
  renderer.render(scene,camera);
})();
</script>
</body>
</html>
